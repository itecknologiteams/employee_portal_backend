name: Deploy Backend (Self-hosted)

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Update code and restart
        run: |
          set -e
          cd /opt/backend
          git fetch --all
          git reset --hard origin/main
          npm ci --omit=dev
          npm run build --if-present
          pm2 restart backend-employee-portal || pm2 start npm --name backend-employee-portal -- start
          pm2 save
