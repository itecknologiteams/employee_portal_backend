name: Deploy Backend (Self-hosted)

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Update code and restart
        run: |
          set -e
          cd /opt/backend
          git fetch --all
          git reset --hard origin/main
          npm ci --omit=dev
          npm run build --if-present
          if pm2 describe emp-portal-backend > /dev/null 2>&1; then
            pm2 reload emp-portal-backend
          else
            pm2 start npm --name emp-portal-backend -- start
          fi
          pm2 save
